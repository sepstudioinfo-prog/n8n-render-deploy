# ============================================
# SEP STUDIO - Render Blueprint Configuration
# ============================================
# ⚠️ PASSWORDS/KEYS ARE SET IN RENDER DASHBOARD
#    NOT IN THIS FILE!
# ============================================

services:
  - type: web
    name: sep-studio-n8n
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # ============================================
      # AUTHENTICATION (Set in Render Dashboard)
      # ============================================
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: zed
      # ⚠️ PASSWORD - SET IN RENDER DASHBOARD (NOT HERE!)
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      
      # ============================================
      # ENCRYPTION (Auto-generated by Render)
      # ============================================
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      # ============================================
      # URL CONFIGURATION
      # ============================================
      - key: N8N_EXTERNAL_URL
        value: https://sepstudio-n8n.onrender.com
      - key: WEBHOOK_URL
        value: https://sepstudio-n8n.onrender.com
      
      # ============================================
      # PERSISTENCE - SQLite
      # ============================================
      - key: DB_TYPE
        value: sqlite
      
      # ============================================
      # PERFORMANCE
      # ============================================
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "false"
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "336"
